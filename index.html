<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NGP Lite Kit, Louver, and Glass Pricing Calculator</title>
<style>
  :root {
    --bg: #1a1a2e;
    --panel: #16213e;
    --accent: #e94560;
    --text: #e8e8e8;
    --muted: #a0a0b0;
    --border: #2a3a5e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: linear-gradient(135deg, var(--bg), #0f1729);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
  }
  h1 {
    font-size: 1.5rem;
    margin-bottom: 4px;
  }
  .subtitle {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 24px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
  }
  label {
    display: block;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 600;
  }
  select, input {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #0f1729;
    color: var(--text);
    font-size: 1rem;
    margin-bottom: 16px;
  }
  select:focus, input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .result {
    margin-top: 8px;
  }
  .result-card {
    background: #0f1729;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    margin-top: 8px;
  }
  .result-card.error {
    border-color: var(--accent);
  }
  .result-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .result-row:last-child { border-bottom: none; }
  .result-label {
    color: var(--muted);
    font-size: 0.9rem;
  }
  .result-value {
    font-size: 1.3rem;
    font-weight: 700;
  }
  .result-value.net {
    color: var(--accent);
  }
  .note {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 10px;
    line-height: 1.5;
  }
  .badge {
    display: inline-block;
    background: var(--accent);
    color: white;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    margin-left: 6px;
    vertical-align: middle;
  }
</style>
</head>
<body>
<div class="container">
  <h1>NGP Lite Kit, Louver, and Glass Pricing Calculator</h1>
  <div class="subtitle">June 8, 2026 Price List &mdash; Standalone (no install, works offline)</div>

  <div class="card">
    <label for="litekit-select">Lite Kits (kit only &amp; with glass)</label>
    <select id="litekit-select" onchange="onCategorySelect('litekit-select')"></select>

    <label for="louver-select">Louvers</label>
    <select id="louver-select" onchange="onCategorySelect('louver-select')"></select>

    <label for="glass-select">Glass Only</label>
    <select id="glass-select" onchange="onCategorySelect('glass-select')"></select>

    <div id="variant-row" style="display:none">
      <label for="variant-select">Variant</label>
      <select id="variant-select" onchange="onVariantChange()"></select>
    </div>

    <div id="material-row" style="display:none">
      <label for="material-select">Material</label>
      <select id="material-select" onchange="calculate()"></select>
    </div>

    <div id="finish-row" style="display:none">
      <label for="finish-select">Finish</label>
      <select id="finish-select" onchange="calculate()"></select>
    </div>

    <div id="size-row" style="display:none">
      <label for="size-select">Size (fixed catalog sizes only — no custom sizes available)</label>
      <select id="size-select" onchange="calculate()"></select>
    </div>

    <div id="dims-row" class="row">
      <div>
        <label for="width-input">Width (inches)</label>
        <input type="number" id="width-input" min="1" step="0.0625" placeholder="e.g. 23" oninput="calculate()">
      </div>
      <div>
        <label for="height-input">Height (inches)</label>
        <input type="number" id="height-input" min="1" step="0.0625" placeholder="e.g. 47" oninput="calculate()">
      </div>
    </div>

    <label for="multiplier-input">Discount Multiplier (optional, e.g. 0.40 for net price)</label>
    <input type="number" id="multiplier-input" min="0" max="1" step="0.01" placeholder="e.g. 0.40" oninput="calculate()">

    <div id="result" class="result"></div>
  </div>

  <p class="note">Odd inch and fractional sizes are automatically rounded up to the next even inch (per NGP table rules). Minimum/maximum size limits are enforced per product.</p>
</div>

PRODUCTS.lfra100_firelite.table = PRODUCTS.lfra100_pyranf.table;
PRODUCTS.firelite_glass.table = PRODUCTS.pyranf_glass.table;

let activeProductKey = null;

const CATEGORY_SELECTS = {
  'Lite Kits': 'litekit-select',
  'Louvers': 'louver-select',
  'Glass': 'glass-select'
};

function populateDropdown() {
  const lists = { 'Lite Kits': [], 'Louvers': [], 'Glass': [] };
  Object.entries(PRODUCTS).forEach(([key, p]) => {
    const cat = p.category || 'Lite Kits';
    const pageMatch = p.label.match(/p\.(\d+)/);
    const page = pageMatch ? parseInt(pageMatch[1], 10) : 9999;
    (lists[cat] || lists['Lite Kits']).push({ key, label: p.label, page });
  });
  Object.entries(CATEGORY_SELECTS).forEach(([cat, selId]) => {
    const sel = document.getElementById(selId);
    const sorted = lists[cat].slice().sort((a, b) => a.page - b.page);
    const opts = sorted.map(item => `<option value="${item.key}">${item.label}</option>`).join('');
    sel.innerHTML = `<option value="">-- Select --</option>` + opts;
  });
}

function onCategorySelect(selectId) {
  const sel = document.getElementById(selectId);
  const key = sel.value;
  if (!key) { return; }
  activeProductKey = key;
  // Clear the other two dropdowns so only one product is active at a time
  Object.values(CATEGORY_SELECTS).forEach(id => {
    if (id !== selectId) document.getElementById(id).value = '';
  });
  onProductChange();
}

function onVariantChange() {
  calculate();
}

function onProductChange() {
  if (!activeProductKey) {
    document.getElementById('result').innerHTML = '';
    return;
  }
  const product = PRODUCTS[activeProductKey];
  const variantRow = document.getElementById('variant-row');
  const variantSel = document.getElementById('variant-select');

  if (product.variants) {
    variantRow.style.display = '';
    variantSel.innerHTML = product.variants.map((v, i) =>
      `<option value="${i}">${v.label}</option>`).join('');
  } else {
    variantRow.style.display = 'none';
    variantSel.innerHTML = '';
  }

  const materialRow = document.getElementById('material-row');
  const materialSel = document.getElementById('material-select');

  if (product.materials) {
    materialRow.style.display = '';
    materialSel.innerHTML = product.materials.map((m, i) =>
      `<option value="${i}">${m.label}</option>`).join('');
  } else {
    materialRow.style.display = 'none';
    materialSel.innerHTML = '';
  }

  const finishRow = document.getElementById('finish-row');
  const finishSel = document.getElementById('finish-select');
  if (product.finishes) {
    finishRow.style.display = '';
    finishSel.innerHTML = product.finishes.map((f, i) =>
      `<option value="${i}">${f.label}</option>`).join('');
  } else {
    finishRow.style.display = 'none';
    finishSel.innerHTML = '';
  }

  const sizeRow = document.getElementById('size-row');
  const sizeSel = document.getElementById('size-select');
  const dimsRow = document.getElementById('dims-row');
  if (product.fixedSizes) {
    sizeRow.style.display = '';
    dimsRow.style.display = 'none';
    sizeSel.innerHTML = product.fixedSizes.map((s, i) =>
      `<option value="${i}">${s.label}</option>`).join('');
  } else {
    sizeRow.style.display = 'none';
    dimsRow.style.display = '';
    sizeSel.innerHTML = '';
  }

  calculate();
}

// Round up to next even inch (NGP odd-inch rounding rule)
function roundToNextEven(n) {
  let r = Math.ceil(n);
  if (r % 2 !== 0) r += 1;
  return r;
}

// Find the smallest table value >= target within table's available list
function snapToTableValue(value, sortedList) {
  for (const v of sortedList) {
    if (v >= value) return v;
  }
  return null; // exceeds max
}

function calculate() {
  if (!activeProductKey) {
    document.getElementById('result').innerHTML = '';
    return;
  }
  const product = PRODUCTS[activeProductKey];
  const widthRaw = parseFloat(document.getElementById('width-input').value);
  const heightRaw = parseFloat(document.getElementById('height-input').value);
  const multiplierRaw = parseFloat(document.getElementById('multiplier-input').value);
  const multiplier = (!isNaN(multiplierRaw) && multiplierRaw > 0 && multiplierRaw <= 1) ? multiplierRaw : null;

  const resultDiv = document.getElementById('result');

  if (product.fixedSizes) {
    const sizeIdx = parseInt(document.getElementById('size-select').value, 10) || 0;
    const sizeOpt = product.fixedSizes[sizeIdx];
    if (!sizeOpt) { resultDiv.innerHTML = ''; return; }
    const listPrice = sizeOpt.price;
    let netRow = '';
    if (multiplier) {
      const net = (listPrice * multiplier).toFixed(2);
      netRow = `
        <div class="result-row">
          <span class="result-label">Net Price (&times;${multiplier})</span>
          <span class="result-value net">$${net}</span>
        </div>`;
    }
    resultDiv.innerHTML = `
      <div class="result-card">
        <div class="result-row">
          <span class="result-label">Size</span>
          <span class="result-value" style="font-size:1.1rem">${sizeOpt.label}</span>
        </div>
        <div class="result-row">
          <span class="result-label">List Price</span>
          <span class="result-value">$${listPrice.toFixed(2)}</span>
        </div>
        ${netRow}
      </div>
      <p class="disclaimer" style="margin-top:8px">Fixed catalog size — no custom sizes available for this product.</p>`;
    return;
  }

  if (isNaN(widthRaw) || isNaN(heightRaw)) {
    resultDiv.innerHTML = '';
    return;
  }

  let variant = null;
  if (product.variants) {
    const variantIdx = parseInt(document.getElementById('variant-select').value, 10) || 0;
    variant = product.variants[variantIdx];
  }
  const effMinW = variant ? variant.minW : product.minW;
  const effMaxW = variant ? variant.maxW : product.maxW;
  const effMinH = variant ? variant.minH : product.minH;
  const effMaxH = variant ? variant.maxH : product.maxH;

  if (widthRaw < effMinW || widthRaw > effMaxW || heightRaw < effMinH || heightRaw > effMaxH) {
    resultDiv.innerHTML = `
      <div class="result-card error">
        <div class="result-label">Out of range</div>
        <div class="result-value">Width must be ${effMinW}&Prime;&ndash;${effMaxW}&Prime;, height ${effMinH}&Prime;&ndash;${effMaxH}&Prime;.</div>
      </div>`;
    return;
  }

  if (product.noFractional && (widthRaw % 1 !== 0 || heightRaw % 1 !== 0)) {
    resultDiv.innerHTML = `
      <div class="result-card error">
        <div class="result-label">Fractional sizes not available</div>
        <div class="result-value">This product only accepts whole-inch sizes (odd inches round up to next even, free).</div>
      </div>`;
    return;
  }

  // Glass products: snap directly to next largest listed size (sizes are not all even-stepped).
  // Lite kit / louver products: round odd/fractional inches up to next even inch first, then snap.
  const widthRounded = product.glassRounding ? widthRaw : roundToNextEven(widthRaw);
  const heightRounded = product.glassRounding ? heightRaw : roundToNextEven(heightRaw);

  const widthSnapped = snapToTableValue(widthRounded, product.table.widths);
  const heightSnapped = snapToTableValue(heightRounded, product.table.heights);

  if (widthSnapped === null || heightSnapped === null) {
    resultDiv.innerHTML = `
      <div class="result-card error">
        <div class="result-label">Out of range</div>
        <div class="result-value">Requested size exceeds the largest size in the price table.</div>
      </div>`;
    return;
  }

  const priceKey = `${heightSnapped}_${widthSnapped}`;
  const basePrice = product.table.prices[priceKey];

  if (basePrice === undefined) {
    resultDiv.innerHTML = `
      <div class="result-card error">
        <div class="result-label">Not found</div>
        <div class="result-value">No price entry for ${widthSnapped}&Prime; &times; ${heightSnapped}&Prime;.</div>
      </div>`;
    return;
  }

  let listPrice = basePrice;
  if (variant) {
    listPrice = +(listPrice * variant.multiplier).toFixed(2);
  }
  const variantRowHtml = variant
    ? `<div class="result-row">
        <span class="result-label">Variant</span>
        <span class="result-value" style="font-size:1rem">${variant.label}</span>
      </div>`
    : '';

  let material = null;
  if (product.materials) {
    const materialIdx = parseInt(document.getElementById('material-select').value, 10) || 0;
    material = product.materials[materialIdx];
    listPrice = +(basePrice * material.multiplier).toFixed(2);
  }

  const materialRowHtml = material
    ? `<div class="result-row">
        <span class="result-label">Material</span>
        <span class="result-value" style="font-size:1rem">${material.label}</span>
      </div>`
    : '';

  let finish = null;
  if (product.finishes) {
    const finishIdx = parseInt(document.getElementById('finish-select').value, 10) || 0;
    finish = product.finishes[finishIdx];
    listPrice = +(listPrice * finish.multiplier).toFixed(2);
    if (finish.flatAdd) {
      listPrice = +(listPrice + finish.flatAdd).toFixed(2);
    }
  }

  const finishRowHtml = (finish && finish.key !== 'standard')
    ? `<div class="result-row">
        <span class="result-label">Finish</span>
        <span class="result-value" style="font-size:1rem">${finish.label}</span>
      </div>`
    : '';

  let fractionalNote = '';
  if (product.fractionalSurchargePct) {
    const isFractional = (widthRaw % 1 !== 0) || (heightRaw % 1 !== 0);
    if (isFractional) {
      const surchargePct = product.fractionalSurchargePct * 100;
      listPrice = +(listPrice * (1 + product.fractionalSurchargePct)).toFixed(2);
      fractionalNote = `<div class="note">Fractional size requested &mdash; ${surchargePct}% surcharge applied per NGP table rules.</div>`;
    }
  }

  const roundedNote = (widthRounded !== widthRaw || heightRounded !== heightRaw || widthSnapped !== widthRounded || heightSnapped !== heightRounded)
    ? `<div class="note">Requested ${widthRaw}&Prime; &times; ${heightRaw}&Prime; rounded up to next available size: <strong>${widthSnapped}&Prime; &times; ${heightSnapped}&Prime;</strong>.</div>`
    : '';

  let netRow = '';
  if (multiplier) {
    const net = (listPrice * multiplier).toFixed(2);
    netRow = `
      <div class="result-row">
        <span class="result-label">Net Price (&times;${multiplier})</span>
        <span class="result-value net">$${net}</span>
      </div>`;
  }

  resultDiv.innerHTML = `
    <div class="result-card">
      ${variantRowHtml}
      ${materialRowHtml}
      ${finishRowHtml}
      <div class="result-row">
        <span class="result-label">Size Used</span>
        <span class="result-value" style="font-size:1.1rem">${widthSnapped}&Prime; W &times; ${heightSnapped}&Prime; H</span>
      </div>
      <div class="result-row">
        <span class="result-label">List Price</span>
        <span class="result-value">$${listPrice.toFixed(2)}</span>
      </div>
      ${netRow}
    </div>
    ${roundedNote}
    ${fractionalNote}`;
}

window.onerror = function(msg) {
  document.getElementById('result').innerHTML =
    `<div class="result-card error"><div class="result-label">Script Error</div><div class="result-value" style="font-size:0.95rem">${msg}</div></div>`;
};

populateDropdown();
onProductChange();
</script>
